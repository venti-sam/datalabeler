# ---------------------------------------------------------------- Stage 2 ----
autolabel:
  backend: "sam3"
  version: "sam3"
  checkpoint: null
  device: "cuda"
  score_threshold: 0.40
  max_instances: 100

# ---------------------------------------------------------- Stage 3 (CVAT) ---
cvat:
  # localhost works because the extract service uses host networking (see
  # docker-compose.yml network_mode: host); CVAT's traefik only routes /api/
  # for the localhost Host header.
  host: "http://localhost:8080"
  username_env: "CVAT_USER"
  password_env: "CVAT_PASSWORD"
  org: null
  project_id: null
  conv_mask_to_poly: true
  add_void_label: true

# ---------------------------------------------------------------- Stage 4 ----
package:
  layout: "coco"
  render_semantic_png: true
  split:
    by: "bag"
    ratios: { train: 0.8, val: 0.1, test: 0.1 }
    seed: 42
