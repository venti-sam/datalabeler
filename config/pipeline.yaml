# Working config for the htx_gemini_pipesmall.bag Stage 1 test.
# Paths are absolute /app/... because everything runs inside the docker images.

paths:
  bags:
    - "/app/data/bags/"
  workdir: "/app/work"
  images: "${workdir}/extracted_rosbag_images"   # Stage 1 output
  annotations: "${workdir}/coco_annotations"      # canonical per-frame COCO (stages 2-3)
  dataset: "${workdir}/packaged_dataset"          # Stage 4 packaged (image,label) pairs
  cvat: "${workdir}/cvat_staging"                 # Stage 3 import/export staging
  preview: "${workdir}/preview_overlays"          # `preview` verification overlays
  manifest: "${workdir}/manifest.sqlite"

# ---------------------------------------------------------------- Stage 1 ----
extract:
  topics:
    - "/camera/camera/color/image_raw"   # ROS 2 bag camera_lidar_20260721_093621
  sampling:
    strategy: "interval"
    interval_sec: 1.0
    phash_threshold: 8
    odom_topic: "/odom"
    trans_m: 0.25
    rot_deg: 15.0
  # Lossless label master: annotate/auto-label on artifact-free pixels. Masks are
  # geometry, so they stay valid on the compressed frames used at inference —
  # match that compression at train time (e.g. JPEG augmentation in the loader).
  image_format: "png"
  jpeg_quality: 92          # unused for png; kept for a jpg switch-back
  capture_camera_info: true

# ------------------------------------------------------- Stages 2 & 4 map ----
classes:
  - name: "leaves"
    id: 1
    prompts: ["leaves", "foliage"]
  - name: "table"
    id: 2
    prompts: ["table", "desk"]
  - name: "pipe"
    id: 3
    # Each prompt is one *concept*, run separately. A conjunction is two, and
    # matches nothing: "horizontal and vertical metal pipe" scored 0 masks here
    # where plain "metal pipe" gets 8 -- it covers both orientations precisely by
    # naming neither. Span distinct concepts with more list entries, not "A and B"
    # (but note nothing dedupes across prompts: overlapping hits become doubles).
    prompts: ["metal pipe"]

priority: ["table", "pipe", "leaves"]


